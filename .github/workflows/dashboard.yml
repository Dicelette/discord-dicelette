name: Update Dashboard
on:
  push:
    tags: ["@dicelette/web@*"]
  workflow_dispatch:
  
jobs:
    dashboard_release:
        runs-on: ubuntu-latest
        steps:
        - name: Connect to vps
          uses: appleboy/ssh-action@v1.2.5
          with:
            host: ${{ secrets.HOST }}
            username: lili
            port: ${{secrets.PORT}}
            key: ${{ secrets.SSH_KEY }}
            script: |
                cd dicelette/
                fnm use lts
                git stash push --include-untracked --message "Locales temporaires"
                git pull --rebase
                pnpm i
                pnpm dashboard:build
                pm2 restart dicelette
