name: Sync changelog with documentation
on:
  push:
    branches: [main]
    paths: ["CHANGELOG.md"]
    tags-ignore: ["*"]
  workflow_dispatch:

jobs:
    sync:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@main
            - uses: BetaHuhn/repo-file-sync-action@latest
              with:
                GH_PAT: ${{secrets.GH_PAT}}
                SKIP_PR: true