name: Update VPS
on:
  push:
    tags-ignore:
      - "@dicelette/web@*"
  workflow_dispatch:

jobs:
  update_vps:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to vps
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: lili
          port: ${{secrets.PORT}}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd dicelette/
            fnm use lts
            git stash push --include-untracked --message "Locales temporaires"
            git pull --rebase
            pnpm i
            pnpm run pm2:restart
