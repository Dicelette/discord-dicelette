packages:
  - "apps/*"
  - "packages/*"
  - "dashboard/*"
allowBuilds:
  '@go-task/cli': true
  '@sentry-internal/node-cpu-profiler': true
  '@sentry/node-cpu-profiler': true
  better-sqlite3: true
  canvas: true
  esbuild: true
minimumReleaseAge: 0
minimumReleaseAgeExclude:
  - mathjs@15.2.0
  - react-router@7.15.0
  - '@dicelette/core'
  - discord.js
  - discord-api-types
overrides:
  form-data@>=4.0.0 <4.0.6: ^4.0.6
  mathjs@>=13.1.0 <15.2.0: ^15.2.0
  mathjs@>=13.1.1 <15.2.0: ^15.2.0
  react-router@>=7.0.0 <7.15.0: ^7.15.0
  tar@<=7.5.15: ^7.5.16
  undici@<6.27.0: ^6.27.0
  vite@>=8.0.0 <=8.0.15: ^8.0.16
  ws@>=8.0.0 <8.21.0: ^8.21.0
